PlanetsLib-warn-on-hidden-prerequisites=Ostrzega gracza przy ładowaniu gry, jeśli występują ukryte wymagania dla danych technologii.
PlanetsLib-update-vanilla-recipe-productivity-techs=Dodaje wszystkie istotne formuły do podstawowych technologii wydajności, jeśli te nie zostały jeszcze dodane. Powinno pozostać włączone podczas normalnego użytkowania, ale może powodować problemy z kompatybilnością ze starszymi modami.
PlanetsLib-unlink-hidden-prerequisites=Jeśli jakaś technologia jest wymaganiem innej, ale jest jednocześnie ukryta, zostaje ona usunięta jako wymaganie, aby nie blokować technologii następczej.
PlanetsLib-enhanced-tooltips=Dodaje rozszerzone podpowiedzi do prototypów, ujawniając użytkownikowi wcześniej ukryte informacje.
